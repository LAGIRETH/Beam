<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beam Control Deck</title>
    <style>
        :root {
            --bg-main: #090d16;
            --bg-card: #111827;
            --border-color: #1f2937;
            --text-main: #f9fafb;
            --text-muted: #9ca3af;
            --accent-blue: #2563eb;
            --accent-emerald: #10b981;
            --accent-rose: #f43f5e;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            padding: 2.5rem;
            border-radius: 12px;
            width: 100%;
            max-width: 520px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
        }

        h1 { font-size: 1.35rem; font-weight: 600; margin: 0 0 0.25rem 0; text-align: center; }
        p.subtitle { color: var(--text-muted); font-size: 0.875rem; margin: 0 0 2rem 0; text-align: center; }

        .status-box {
            background-color: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 1.25rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            flex-direction: column;
        }

        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-top-color: var(--accent-blue);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        .status-text { font-size: 0.9rem; font-weight: 500; text-align: center; }

        .action-btn {
            display: none; background-color: var(--accent-blue); color: white; border: none;
            padding: 0.75rem 1.5rem; border-radius: 6px; font-weight: 600; cursor: pointer;
            margin-top: 10px; width: 100%; font-size: 0.9rem; transition: background 0.2s;
        }
        .action-btn:hover { background-color: #1d4ed8; }

        .config-panel {
            margin-top: 1.5rem; border-top: 1px solid var(--border-color); padding-top: 1.5rem;
        }

        .input-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
        .input-group label { font-size: 0.8rem; color: var(--text-muted); font-weight: 500; }
        .input-group input {
            background-color: rgba(0, 0, 0, 0.3); border: 1px solid var(--border-color);
            padding: 0.6rem; border-radius: 6px; color: white; font-family: monospace; font-size: 0.9rem;
        }

        .transfer-panel { margin-top: 1.5rem; border-top: 1px solid var(--border-color); padding-top: 1.5rem; }
        .file-info { display: flex; justify-content: space-between; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 0.5rem; }
        .file-name { color: var(--text-main); font-weight: 500; max-width: 70%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .progress-bar-bg { background-color: rgba(255, 255, 255, 0.05); border: 1px solid var(--border-color); border-radius: 9999px; height: 8px; width: 100%; overflow: hidden; }
        .progress-bar-fill { background-color: var(--accent-blue); height: 100%; width: 0%; transition: width 0.1s ease; }

        .log-box {
            background-color: rgba(0, 0, 0, 0.4); border: 1px solid var(--border-color); border-radius: 6px;
            padding: 10px; height: 140px; overflow-y: auto; font-family: monospace; font-size: 0.75rem; color: #34d399; margin-top: 10px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="card" id="controlCard">
        <h1 id="mainTitle">Beam Operations Center</h1>
        <p id="subTitle" class="subtitle">Secure point-to-point synchronization node</p>
        
        <div class="status-box">
            <div id="statusIndicator" class="spinner"></div>
            <div id="statusText" class="status-text">Synchronizing core...</div>
            <button id="actionBtn" class="action-btn">Allocate Local Disk Space</button>
        </div>

        <!-- PLUGINS WILL BE GENERATED CONDITIONALLY AND ISOLATED -->
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const roomID = urlParams.get('id');
        const opMode = urlParams.get('mode') || 'file';

        const card = document.getElementById('controlCard');
        const statusText = document.getElementById('statusText');
        const statusIndicator = document.getElementById('statusIndicator');
        const actionBtn = document.getElementById('actionBtn');

        function uiState(text, mode) {
            statusText.textContent = text;
            if (mode === 'loading') {
                statusIndicator.style.display = 'block';
                statusIndicator.style.borderColor = 'rgba(255, 255, 255, 0.1)';
                statusIndicator.style.borderTopColor = 'var(--accent-blue)';
                statusIndicator.style.animation = 'spin 0.8s linear infinite';
            } else if (mode === 'success') {
                statusIndicator.style.borderColor = 'var(--accent-emerald)';
                statusIndicator.style.animation = 'none';
            } else if (mode === 'error') {
                statusIndicator.style.borderColor = 'var(--accent-rose)';
                statusIndicator.style.animation = 'none';
            }
        }

        function appendBuffer(b1, b2) {
            const tmp = new Uint8Array(b1.byteLength + b2.byteLength);
            tmp.set(new Uint8Array(b1), 0);
            tmp.set(new Uint8Array(b2), b1.byteLength);
            return tmp;
        }

        if (!roomID) {
            uiState('Configuration Error: Verification signature missing', 'error');
        } else if (opMode === 'file') {
            // ==========================================
            // STRICT ISOLATED ROUTINE: FILE TRANSPORTER
            // ==========================================
            document.getElementById('mainTitle').textContent = "Beam Transporter";
            document.getElementById('subTitle').textContent = "Direct-to-Disk High Capacity File Delivery Channel";

            const panel = document.createElement('div');
            panel.className = 'transfer-panel';
            panel.innerHTML = `
                <div class="file-info">
                    <span id="fileName" class="file-name">Awaiting Allocation...</span>
                    <span id="transferProgress">0%</span>
                </div>
                <div class="progress-bar-bg"><div id="progressBarFill" class="progress-bar-fill"></div></div>
            `;
            card.appendChild(panel);

            let fileWritableStream = null;
            let receivedBytes = 0;
            let metadata = null;

            async function initFileEngine() {
                uiState('Connecting pipeline...', 'loading');
                const response = await fetch(`https://ntfy.sh/beam_${roomID}_offer/raw?poll=1`);
                const text = await response.text();
                const b64Offer = text.split('\n').map(l => l.trim()).filter(l => l !== '')[0];

                const pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
                
                pc.ondatachannel = (event) => {
                    const dc = event.channel;
                    dc.binaryType = 'arraybuffer';
                    dc.onopen = () => {
                        uiState('Connected. Local drive permission required.', 'success');
                        actionBtn.style.display = 'block';
                        actionBtn.onclick = async () => {
                            try {
                                const fileHandle = await window.showSaveFilePicker({ suggestedName: "beamed_payload" });
                                fileWritableStream = await fileHandle.createWritable();
                                actionBtn.style.display = 'none';
                                uiState('Disk mapped. Receiving block arrays...', 'loading');
                                dc.send("START");
                            } catch (e) { uiState('Mount failed: ' + e.message, 'error'); }
                        };
                    };

                    dc.onmessage = async (e) => {
                        if (typeof e.data === 'string') {
                            metadata = JSON.parse(e.data);
                            document.getElementById('fileName').textContent = metadata.name;
                            panel.style.display = 'block';
                            return;
                        }
                        await fileWritableStream.write(e.data);
                        receivedBytes += e.data.byteLength;
                        const percent = ((receivedBytes / metadata.size) * 100).toFixed(1);
                        document.getElementById('transferProgress').textContent = `${percent}%`;
                        document.getElementById('progressBarFill').style.width = `${percent}%`;

                        if (receivedBytes >= metadata.size) {
                            uiState('Transmission secure. Volume closed.', 'success');
                            document.getElementById('progressBarFill').style.backgroundColor = 'var(--accent-emerald)';
                            await fileWritableStream.close();
                        }
                    };
                };

                await pc.setRemoteDescription(new RTCSessionDescription({ type: 'offer', sdp: atob(b64Offer) }));
                await pc.setLocalDescription(await pc.createAnswer());
                await new Promise(r => pc.iceGatheringState === 'complete' ? r() : pc.onicegatheringstatechange = () => pc.iceGatheringState === 'complete' && r());
                await fetch(`https://ntfy.sh/beam_${roomID}_answer`, { method: 'POST', body: btoa(pc.localDescription.sdp) });
            }
            initFileEngine().catch(err => uiState(err.message, 'error'));

        } else if (opMode === 'proxy') {
            // ==========================================
            // STRICT ISOLATED ROUTINE: SECURE PROXY
            // ==========================================
            document.getElementById('mainTitle').textContent = "Beam Proxy Node";
            document.getElementById('subTitle').textContent = "Layer-4 Multiplexed Port-Mapping Interface";

            const panel = document.createElement('div');
            panel.className = 'config-panel';
            panel.innerHTML = `
                <div class="input-group">
                    <label>Proxy Forward Destination Target</label>
                    <input type="text" id="proxyTarget" value="https://api.github.com">
                </div>
                <div class="input-group">
                    <label>Active Multiplex Log Trace</label>
                    <div id="proxyLogs" class="log-box">> Core proxy logic initialized standalone...</div>
                </div>
            `;
            card.appendChild(panel);

            const proxyTarget = document.getElementById('proxyTarget');
            const proxyLogs = document.getElementById('proxyLogs');
            const proxyBuffers = new Map();

            function logProxy(msg) {
                const el = document.createElement('div');
                el.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
                proxyLogs.appendChild(el);
                proxyLogs.scrollTop = proxyLogs.scrollHeight;
            }

            async function processHttpRequest(connID, reqState, dc) {
                if (reqState.completed) return;
                const bytes = reqState.bytes;
                let headerEnd = -1;
                for (let i = 0; i < bytes.length - 3; i++) {
                    if (bytes[i] === 13 && bytes[i+1] === 10 && bytes[i+2] === 13 && bytes[i+3] === 10) {
                        headerEnd = i; break;
                    }
                }
                if (headerEnd === -1) return;

                const headerText = new TextDecoder().decode(bytes.subarray(0, headerEnd));
                const lines = headerText.split('\r\n');
                const requestLine = lines[0].split(' ');
                const method = requestLine[0];
                const path = requestLine[1];
                if (!method || !path) return;

                const headers = {};
                let contentLength = 0;
                for (let i = 1; i < lines.length; i++) {
                    const parts = lines[i].split(': ');
                    if (parts.length >= 2) {
                        const key = parts[0].toLowerCase();
                        const val = parts.slice(1).join(': ');
                        headers[key] = val;
                        if (key === 'content-length') contentLength = parseInt(val, 10);
                    }
                }

                const totalExpectedLength = headerEnd + 4 + contentLength;
                if (bytes.length < totalExpectedLength) return;

                reqState.completed = true;
                const bodyBytes = bytes.subarray(headerEnd + 4, totalExpectedLength);

                // FIXED: Direct custom root status response is now perfectly formatted into a 5-byte multiplexed header frame
                if (path === '/') {
                    const payload = `HTTP/1.1 200 OK\r\nContent-Type: text/html\r\nConnection: close\r\n\r\n` + 
                                    `<html><body style="background:#090d16;color:#f9fafb;font-family:sans-serif;padding:40px;text-align:center;">` +
                                    `<h1>🚀 Beam Proxy Operating Perfectly</h1><p style="color:#9ca3af;">Layer-4 WebRTC Multi-Tunnel Core Engine Is Operational.</p>` +
                                    `</body></html>`;
                    const payloadBytes = new TextEncoder().encode(payload);
                    const packet = new Uint8Array(5 + payloadBytes.byteLength);
                    const view = new DataView(packet.buffer);
                    view.setUint32(0, connID);
                    view.setUint8(4, 0);
                    packet.set(payloadBytes, 5);
                    dc.send(packet);

                    const closeFrame = new Uint8Array(5);
                    new DataView(closeFrame.buffer).setUint32(0, connID);
                    closeFrame[4] = 1;
                    dc.send(closeFrame);
                    logProxy(`Served root status pipeline successfully [#${connID}]`);
                    return;
                }

                const targetUrl = proxyTarget.value.trim().replace(/\/$/, '') + path;
                logProxy(`Routing: ${method} -> ${path}`);

                try {
                    const fetchOptions = { method: method, headers: headers };
                    if (method !== 'GET' && method !== 'HEAD' && contentLength > 0) fetchOptions.body = bodyBytes;

                    const response = await fetch(targetUrl, fetchOptions);
                    const resBuffer = await response.arrayBuffer();

                    let httpResponseString = `HTTP/1.1 ${response.status} ${response.statusText}\r\n`;
                    response.headers.forEach((v, k) => { httpResponseString += `${k}: ${v}\r\n`; });
                    httpResponseString += `Content-Length: ${resBuffer.byteLength}\r\nConnection: close\r\n\r\n`;

                    const headerBytes = new TextEncoder().encode(httpResponseString);
                    const completePacket = new Uint8Array(5 + headerBytes.byteLength + resBuffer.byteLength);
                    const view = new DataView(completePacket.buffer);
                    view.setUint32(0, connID);
                    view.setUint8(4, 0);
                    completePacket.set(headerBytes, 5);
                    completePacket.set(new Uint8Array(resBuffer), 5 + headerBytes.byteLength);
                    dc.send(completePacket);

                    const closeFrame = new Uint8Array(5);
                    new DataView(closeFrame.buffer).setUint32(0, connID);
                    closeFrame[4] = 1;
                    dc.send(closeFrame);
                } catch (err) {
                    logProxy(`Fetch Failure: ${err.message}`);
                }
            }

            async function initProxyEngine() {
                uiState('Mapping core data tunnels...', 'loading');
                const response = await fetch(`https://ntfy.sh/beam_${roomID}_offer/raw?poll=1`);
                const text = await response.text();
                const b64Offer = text.split('\n').map(l => l.trim()).filter(l => l !== '')[0];

                const pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
                pc.ondatachannel = (event) => {
                    const dc = event.channel;
                    if (dc.label !== 'beam-proxy') return;
                    dc.binaryType = 'arraybuffer';
                    dc.onopen = () => uiState('Proxy data pipeline open.', 'success');
                    dc.onmessage = async (e) => {
                        const view = new DataView(e.data);
                        const connID = view.getUint32(0);
                        const statusFlag = view.getUint8(4);
                        const payload = e.data.slice(5);

                        if (statusFlag === 1) { proxyBuffers.delete(connID); return; }
                        if (!proxyBuffers.has(connID)) proxyBuffers.set(connID, { bytes: new Uint8Array(0), completed: false });

                        let reqState = proxyBuffers.get(connID);
                        reqState.bytes = appendBuffer(reqState.bytes, new Uint8Array(payload));
                        processHttpRequest(connID, reqState, dc);
                    };
                };

                await pc.setRemoteDescription(new RTCSessionDescription({ type: 'offer', sdp: atob(b64Offer) }));
                await pc.setLocalDescription(await pc.createAnswer());
                await new Promise(r => pc.iceGatheringState === 'complete' ? r() : pc.onicegatheringstatechange = () => pc.iceGatheringState === 'complete' && r());
                await fetch(`https://ntfy.sh/beam_${roomID}_answer`, { method: 'POST', body: btoa(pc.localDescription.sdp) });
            }
            initProxyEngine().catch(err => uiState(err.message, 'error'));
        }
    </script>
</body>
</html>
