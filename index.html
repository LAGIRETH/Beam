<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beam Receiver</title>
    <style>
        :root {
            --bg-main: #0b0f19;
            --bg-card: #151b2c;
            --border-color: #242f47;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-primary: #3b82f6;
            --accent-success: #10b981;
            --accent-error: #ef4444;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            padding: 2.5rem;
            border-radius: 12px;
            width: 100%;
            max-width: 520px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3), 0 8px 10px -6px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        .logo-container {
            display: flex;
            justify-content: center;
            margin-bottom: 1.5rem;
        }

        .logo-icon {
            width: 48px;
            height: 48px;
            background: rgba(59, 130, 246, 0.1);
            color: var(--accent-primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            margin: 0 0 0.5rem 0;
            letter-spacing: -0.025em;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 0.925rem;
            margin: 0 0 2rem 0;
        }

        .status-container {
            background-color: rgba(0, 0, 0, 0.15);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 1.25rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            min-height: 24px;
        }

        .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-top-color: var(--accent-primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        .status-text {
            font-size: 0.95rem;
            font-weight: 500;
        }

        /* Status States */
        .status-text.loading { color: var(--text-main); }
        .status-text.success { color: var(--accent-success); }
        .status-text.error { color: var(--accent-error); }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="logo-container">
            <div class="logo-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 18a5 5 0 0 0-10 0"></path><path d="M12 2v8"></path><path d="m17 14-5-5-5 5"></path></svg>
            </div>
        </div>
        <h1>Beam Receiver</h1>
        <p class="subtitle">Direct automated peer-to-peer data transport pipeline</p>
        
        <div class="status-container">
            <div id="statusIndicator" class="spinner"></div>
            <div id="statusText" class="status-text loading">Initializing context...</div>
        </div>
    </div>

    <script>
        const statusText = document.getElementById('statusText');
        const statusIndicator = document.getElementById('statusIndicator');

        function updateStatus(message, type = 'loading') {
            statusText.textContent = message;
            statusText.className = 'status-text ' + type;
            
            if (type === 'loading') {
                statusIndicator.style.display = 'block';
                statusIndicator.style.borderColor = 'rgba(255, 255, 255, 0.1)';
                statusIndicator.style.borderTopColor = 'var(--accent-primary)';
                statusIndicator.style.animation = 'spin 0.8s linear infinite';
            } else if (type === 'success') {
                statusIndicator.style.display = 'block';
                statusIndicator.style.borderColor = 'var(--accent-success)';
                statusIndicator.style.animation = 'none';
            } else if (type === 'error') {
                statusIndicator.style.display = 'block';
                statusIndicator.style.borderColor = 'var(--accent-error)';
                statusIndicator.style.animation = 'none';
            }
        }

        async function initReceiver() {
            const urlParams = new URLSearchParams(window.location.search);
            const roomID = urlParams.get('id');
            
            if (!roomID) {
                updateStatus('Configuration Error: Missing connection parameter', 'error');
                return;
            }

            try {
                updateStatus('Fetching session synchronization profile...');
                
                // Fetch the raw text SDP Offer directly from the public ntfy node
                const response = await fetch(`https://ntfy.sh/beam_${roomID}_offer/raw`);
                if (!response.ok) throw new Error('Signaling broker unreachable');
                
                const offerSDP = await response.text();
                if (!offerSDP || offerSDP.trim() === "") {
                    throw new Error('Channel synchronization profile expired or null');
                }

                updateStatus('Configuring secure WebRTC transport interface...');

                const pc = new RTCPeerConnection({
                    iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
                });

                // Configure data pipeline monitoring listeners
                pc.ondatachannel = (event) => {
                    const dataChannel = event.channel;
                    
                    dataChannel.onopen = () => {
                        updateStatus('Direct connection active. Pipeline synchronized.', 'success');
                    };

                    dataChannel.onmessage = (e) => {
                        console.log("Inbound payload received:", e.data);
                    };
                };

                // Assign Remote Description (Offer) received from Go client
                await pc.setRemoteDescription(new RTCSessionDescription({
                    type: 'offer',
                    sdp: offerSDP
                }));

                // Formulate Local Description (Answer)
                const answer = await pc.createAnswer();
                await pc.setLocalDescription(answer);

                updateStatus('Assembling network configurations (ICE)...');

                // Wait for localized network configurations to stabilize for robust mapping
                await new Promise(resolve => {
                    if (pc.iceGatheringState === 'complete') {
                        resolve();
                    } else {
                        pc.onicegatheringstatechange = () => {
                            if (pc.iceGatheringState === 'complete') resolve();
                        };
                    }
                });

                updateStatus('Publishing handshakes to routing pipeline...');

                // Push response back to ntfy network so the client picks it up
                const postResponse = await fetch(`https://ntfy.sh/beam_${roomID}_answer`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain' },
                    body: pc.localDescription.sdp
                });

                if (!postResponse.ok) throw new Error('Synchronization callback transmission failed');
                
                updateStatus('Awaiting validation from local deployment loop...');

            } catch (err) {
                updateStatus(err.message, 'error');
                console.error(err);
            }
        }

        // Initialize execution sequence context on DOM load
        initReceiver();
    </script>
</body>
</html>
